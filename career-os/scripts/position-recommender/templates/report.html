<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{title}}</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6f8;
      --panel: #ffffff;
      --text: #1b1f24;
      --muted: #5a6270;
      --line: #dde2e8;
      --accent: #0a66c2;
      --tier-strong-ink: #1a7f4b;
      --tier-strong-rule: #2bA968;
      --tier-stretch-ink: #8a4a00;
      --tier-stretch-rule: #d98a2b;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
      line-height: 1.6;
    }
    main { max-width: 940px; margin: 0 auto; padding: 32px 18px 56px; }
    header { margin-bottom: 18px; }
    header h1 { margin: 0 0 4px; font-size: 24px; font-weight: 700; line-height: 1.3; overflow-wrap: anywhere; }
    .meta { color: var(--muted); font-size: 0.86em; margin: 0; }
    article {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 24px 28px 30px;
    }
    h2 {
      margin: 30px 0 12px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
      font-size: 18px;
      font-weight: 700;
      line-height: 1.3;
    }
    h2.tier-strong { color: var(--tier-strong-ink); border-top-color: var(--tier-strong-rule); }
    h2.tier-stretch { color: var(--tier-stretch-ink); border-top-color: var(--tier-stretch-rule); }
    h2.tier-hold { color: var(--muted); }
    p { margin: 8px 0; }
    p.note, p.empty { color: var(--muted); font-size: 0.9em; }
    article > ul { margin: 10px 0; padding-left: 20px; }
    article > ul > li { margin: 5px 0; }

    /* 카드 리스트 */
    ol.cards { list-style: none; margin: 14px 0; padding: 0; }
    li.card {
      background: #fbfcfd;
      border: 1px solid var(--line);
      border-left: 4px solid var(--line);
      border-radius: 8px;
      padding: 14px 18px 16px;
      margin: 12px 0;
    }
    h2.tier-strong + ol.cards li.card { border-left-color: var(--tier-strong-rule); }
    h2.tier-stretch + ol.cards li.card { border-left-color: var(--tier-stretch-rule); }
    li.card.hold, li.card.lead { background: #f8f9fb; border-left-color: var(--line); }

    .card-head { display: flex; align-items: center; gap: 9px; margin-bottom: 10px; }
    .rank {
      flex: none;
      width: 23px; height: 23px;
      border-radius: 50%;
      background: var(--accent); color: #fff;
      font-size: 0.8em; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }
    .card-head h3 { margin: 0; font-size: 16px; font-weight: 700; line-height: 1.35; overflow-wrap: anywhere; }

    /* 라벨-값 2열 정렬 */
    dl.fields {
      display: grid;
      grid-template-columns: max-content 1fr;
      gap: 5px 14px;
      margin: 0;
    }
    dl.fields dt {
      color: var(--muted);
      font-weight: 600;
      font-size: 0.88em;
      padding-top: 1px;
    }
    dl.fields dd { margin: 0; overflow-wrap: anywhere; }
    dl.fields dd ul.sub { margin: 2px 0 0; padding-left: 16px; }
    dl.fields dd ul.sub li { margin: 2px 0; }

    /* 신호 배지 */
    .badge {
      display: inline-block;
      padding: 0 8px;
      border-radius: 10px;
      font-size: 0.82em;
      font-weight: 700;
      line-height: 1.65;
      vertical-align: 1px;
    }
    .badge-strong { background: #e3f5ec; color: #1a7f4b; }
    .badge-mid { background: #fbeed6; color: #8a4a00; }
    .badge-weak { background: #f1e0e0; color: #9a3b3b; }

    a { color: var(--accent); word-break: break-all; overflow-wrap: anywhere; }
    code {
      padding: 1px 6px;
      border-radius: 4px;
      background: #eef2f6;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.86em;
    }
    details.diagnostics { margin-top: 16px; border: 1px solid var(--line); border-radius: 6px; background: var(--panel); }
    details.diagnostics summary { padding: 10px 16px; cursor: pointer; font-size: 0.86em; color: var(--muted); list-style: none; }
    details.diagnostics summary::-webkit-details-marker { display: none; }

    @media (max-width: 640px) {
      main { padding: 16px 10px 36px; }
      article { padding: 16px 14px 20px; }
      header h1 { font-size: 20px; }
      h2 { font-size: 16px; }
      /* 좁은 화면에선 라벨을 값 위로 */
      dl.fields { grid-template-columns: 1fr; gap: 1px; }
      dl.fields dt { padding-top: 8px; }
      dl.fields dt:first-child { padding-top: 0; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>{{title}}</h1>
      <p class="meta">{{generatedAt}}</p>
    </header>
    <article>
{{reportHtml}}
    </article>
    {{sourceDiagnosticsHtml}}
  </main>
</body>
</html>
