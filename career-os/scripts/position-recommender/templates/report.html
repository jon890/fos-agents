<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{title}}</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fa;
      --panel: #ffffff;
      --text: #1b1f24;
      --muted: #58606a;
      --line: #d8dee4;
      --accent: #0a66c2;
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.62;
    }
    main {
      max-width: 920px;
      margin: 0 auto;
      padding: 32px 18px 56px;
    }
    header {
      margin-bottom: 8px;
    }
    header h1 {
      margin: 0 0 4px;
      font-size: 28px;
      line-height: 1.28;
    }
    .meta {
      color: var(--muted);
      font-size: 0.88em;
      margin: 0 0 20px;
    }
    article {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 28px;
    }
    h1, h2, h3 { line-height: 1.28; letter-spacing: 0; }
    h1 { margin: 0 0 20px; font-size: 28px; }
    h2 { margin: 32px 0 12px; padding-top: 18px; border-top: 1px solid var(--line); font-size: 21px; }
    h3 { margin: 24px 0 10px; font-size: 17px; }
    p, ul, ol { margin: 10px 0; }
    li { margin: 6px 0; }
    a { color: var(--accent); word-break: break-all; }
    code {
      padding: 2px 5px;
      border-radius: 5px;
      background: #eef2f6;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.92em;
    }
    pre {
      overflow-x: auto;
      padding: 14px;
      border-radius: 8px;
      background: #111827;
      color: #f9fafb;
    }
    @media (max-width: 640px) {
      main { padding: 16px 10px 36px; }
      article { padding: 18px; }
      header h1 { font-size: 23px; }
      h1 { font-size: 23px; }
      h2 { font-size: 19px; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>{{title}}</h1>
      <p class="meta">{{generatedAt}}</p>
    </header>
    <article>
{{reportHtml}}
    </article>
    {{sourceDiagnosticsHtml}}
  </main>
</body>
</html>
